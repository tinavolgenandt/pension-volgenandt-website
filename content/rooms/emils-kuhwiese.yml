shortDescription: >-
  Gemütliche Ferienwohnung mit Blick in den Garten.
  Eigene Küche, Terrasse und ein zusätzliches
  Schlafsofa – ideal für 2 Personen oder kleine Familien.
description: >-
  Die Ferienwohnung Emil's Kuhwiese bietet Ihnen
  alles, was Sie für einen entspannten Aufenthalt brauchen.
  Die voll ausgestattete Küche ermöglicht Selbstversorgung,
  während die Terrasse zum Frühstück im Grünen einlädt.
  Das Doppelbett bietet Platz für 2 Gäste; ein zusätzliches
  Schlafsofa eignet sich gut für bspw. Kinder, sodass
  Familien mit 2 Erwachsenen und bis zu 2 Kindern
  hier komfortabel wohnen können. WLAN, Fernseher und ein
  eigenes Badezimmer mit Dusche gehören selbstverständlich dazu.

