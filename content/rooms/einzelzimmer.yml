shortDescription: >-
  Gemütliches Einzelzimmer für Alleinreisende und
  Geschäftsreisende. Kompakt, komfortabel und mit
  allem Wichtigen ausgestattet.
description: >-
  Unser Einzelzimmer ist der ideale Rückzugsort für
  Alleinreisende und Geschäftsreisende. Sie finden
  ein bequemes Einzelbett und ein eigenes Badezimmer
  mit Dusche.
  WLAN und Fernseher sorgen für Komfort und Unterhaltung.
  Trotz seiner kompakten Größe bietet das Zimmer alles,
  was Sie für einen angenehmen Aufenthalt brauchen.
  Unsere voll ausgestattete Gemeinschaftsküche und die
  Terrasse dürfen gerne genutzt werden – wir bitten um
  Rücksichtnahme auf andere Gäste.

