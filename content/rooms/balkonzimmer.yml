name: 'Balkonzimmer'
slug: balkonzimmer
type: zweibettzimmer
category: 'Doppelzimmer'
shortDescription: >-
  Gemütliches Zweibettzimmer mit eigenem Balkon und Blick
  in den Innenhof. Der perfekte Rückzugsort für Paare
  und Alleinreisende.
description: >-
  Das Balkonzimmer verbindet gemütliche Atmosphäre mit
  dem besonderen Extra eines eigenen Balkons. Zwei
  Einzelbetten, die auf Wunsch gerne zusammengestellt
  werden, ein kleiner Tisch und ein eigenes Badezimmer
  mit Dusche erwarten Sie. Morgens können Sie Ihren
  Kaffee auf dem Balkon genießen und den Blick über den
  Innenhof schweifen lassen. WLAN und Fernseher sorgen
  für Unterhaltung am Abend. Die voll ausgestattete
  Gemeinschaftsküche und die Terrasse dürfen gerne genutzt
  werden – wir bitten um Rücksichtnahme auf andere Gäste.

