shortDescription: 'Mit der Draisine durch historische Eisenbahntunnel auf stillgelegten Gleisen'
intro: >-
  Ein Fahrerlebnis der besonderen Art: Auf alten Eisenbahngleisen
  durch das Eichsfeld pedalieren – vorbei an Wäldern, Wiesen und
  durch beeindruckende Backsteingewölbe. Ideal für Familien,
  Paare und Gruppen.
content: >-
  Auf stillgelegten Bahnstrecken des Eichsfelds lässt sich die
  Landschaft aus einer ganz anderen Perspektive erleben: per
  Draisine. Die umgebauten Fahrräder auf Schienen folgen dem
  alten Gleisverlauf und führen durch die sanfte Hügellandschaft
  der Region.


  Highlight jeder Tour sind die historischen Backsteingewölbe –
  alte Eisenbahntunnel, die heute beleuchtet und für Besucher
  geöffnet sind. Das gedämpfte Licht, der kühle Fahrtwind und
  die langen Tunnelröhren hinterlassen einen bleibenden Eindruck.


  Die Draisinen fassen meist zwei bis vier Personen und sind
  einfach zu bedienen – keine besondere Fitness oder Vorkenntnisse
  erforderlich. Kinder können mitfahren und erleben eine
  Reise wie aus einer anderen Zeit.


  Die Strecken sind unterschiedlich lang und können nach
  Kondition und Interesse gewählt werden. An den Startpunkten
  gibt es in der Regel Parkplätze und kleine Gastronomie.
hostTip: >-
  Buchen Sie die Draisinen am besten im Voraus – besonders an
  Wochenenden und in der Ferienzeit sind die begehrten Plätze
  schnell vergriffen. Planen Sie etwas Extrazeit ein, um an
  den Tunnelausgängen innezuhalten und die Aussicht zu genießen.
bestTimeToVisit: 'Frühling bis Herbst'
